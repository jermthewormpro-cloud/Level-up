<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --accent: #00d4ff;
            --bg: #0a0a0a;
            --card: #161616;
            --border: #2a2a2a;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* --- SIDEBAR --- */
        #sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #111; border-right: 1px solid var(--border); transition: 0.3s ease; z-index: 2000; padding: 25px; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; }
        .sidebar-overlay.active { display: block; }
        .side-btn { background: #1a1a1a; border: 1px solid var(--border); color: #ccc; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; text-align: left; font-family: 'Orbitron'; font-size: 0.7rem; width: 100%; }

        /* --- SHOP --- */
        #shop-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        .shop-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}

        /* --- MAIN UI --- */
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .nav-bar { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; background: var(--card); border: 1px solid var(--border); color: #666; padding: 10px 4px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.55rem; transition: 0.3s; }
        /* Active Page is Green */
        .nav-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 255, 136, 0.1); }

        .page { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .btn-main { background: var(--primary); border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Orbitron'; color: #000; margin-top: 10px; text-transform: uppercase; font-size: 0.7rem; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; font-size: 0.8rem; }

        /* --- CALENDAR --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1/1; background: #222; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: #444; }
        .cal-pass { background: rgba(0, 255, 136, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        .cal-fail { background: rgba(255, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }

        /* --- PIN PAD --- */
        #parent-modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; transition: 0.4s ease; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        #parent-modal.open { top: 0; }
        .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--primary); margin: 0 8px; }
        .pin-dot.filled { background: var(--primary); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .key { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

    <div id="shop-modal">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 style="font-family:'Orbitron'; color:var(--primary); font-size: 1rem;">REWARDS</h2>
            <button onclick="toggleShop()" style="background:none; border:none; color:white; font-size:1.2rem;">✕</button>
        </div>
        <div id="shop-grid" style="margin-top:20px;"></div>
    </div>

    <div id="parent-modal">
        <button onclick="closeParent()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:1.2rem;">✕</button>
        <h2 id="pin-instruction" style="font-family:'Orbitron'; color:var(--primary); font-size: 0.8rem;">ENTER PIN</h2>
        <div style="display:flex; margin: 20px 0;" id="pin-display">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
            <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
            <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
            <div class="key" style="border:none;"></div><div class="key" onclick="pressKey(0)">0</div><div class="key" onclick="pressBackspace()">⌫</div>
        </div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--primary); font-size: 0.8rem; margin-bottom: 20px;">MENU</h2>
        <button class="side-btn" onclick="toggleShop()">🛒 REWARD SHOP</button>
        <button class="side-btn" onclick="openParent('settings')">🛡️ PARENT PORTAL</button>
    </div>

    <div class="container" id="main-app">
        <div class="header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem;">☰</button>
            <h1 style="font-family:'Orbitron'; font-size: 0.7rem; color:var(--primary);">XP: <span id="total-xp-display">0</span></h1>
            <h1 style="font-family:'Orbitron'; font-size: 0.7rem; color:var(--accent);">LVL <span id="header-lvl">1</span></h1>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" id="btn-dash" onclick="showPage('dash')">DASH</button>
            <button class="nav-btn" id="btn-mission" onclick="showPage('mission')">BOUNTY</button>
            <button class="nav-btn" id="btn-history" onclick="showPage('history')">HISTORY</button>
            <button class="nav-btn" id="btn-vision" onclick="showPage('vision')">VISION</button>
        </div>

        <div id="page-dash" class="page active">
            <div class="card" style="text-align:center;">
                <h2 id="lvl-display" style="font-family:'Orbitron'; color:var(--primary); font-size:3.5rem; margin:0;">1</h2>
                <div style="background:#222; height:8px; border-radius:10px; margin: 15px 0; overflow:hidden;"><div id="xp-fill" style="background:var(--primary); height:100%; width:0%; transition:0.5s;"></div></div>
            </div>
            <div class="card">
                <h3 id="today-usage-display" style="margin:0; font-family:'Orbitron'; font-size: 0.8rem;">0m Used</h3>
                <p id="dynamic-limit-display" style="font-size: 0.55rem; color: var(--accent); margin-top: 5px; font-family:'Orbitron';">Limit: 80m</p>
                <input type="number" id="play-input" placeholder="Minutes used" style="margin-top:15px;">
                <button class="btn-main" onclick="logTime()">LOG SESSION</button>
            </div>
        </div>

        <div id="page-mission" class="page">
            <div class="card" style="border-left:4px solid var(--primary);">
                <span style="color:var(--accent); font-size:0.5rem; font-family:'Orbitron';">ACTIVE BOUNTY</span>
                <div style="background:#000; padding:25px; border-radius:15px; border:1px dashed #444; margin:15px 0; text-align: center;">
                    <span id="challenge-text">Generating...</span>
                </div>
                <p style="text-align: center; color: var(--primary); font-family: 'Orbitron'; font-size: 0.6rem;">+<span id="current-bounty-xp">0</span> XP | +5m Time</p>
                <button class="btn-main" onclick="openParent('bounty')">CLAIM</button>
            </div>
        </div>

        <div id="page-history" class="page">
            <div class="card">
                <h3 id="calendar-month-name" style="font-family:'Orbitron'; font-size:0.8rem; color:var(--accent); margin:0; text-align:center;">MONTH</h3>
                <div id="calendar-days" class="calendar-grid"></div>
            </div>
        </div>

        <div id="page-vision" class="page">
            <div class="card" id="chat-box" style="height:250px; overflow-y:auto; background:#000; font-size: 0.75rem; padding:15px;"></div>
            <input type="text" id="chat-input" placeholder="Query Vision...">
            <button class="btn-main" style="background:var(--accent)" onclick="askVision()">SEND</button>
        </div>

        <div id="page-parent" class="page">
            <div class="card">
                <h3 style="font-family:'Orbitron'; color:var(--accent); margin-top:0; font-size:0.8rem;">SETTINGS</h3>
                
                <h4 style="font-size:0.6rem; color:#888;">DAILY BONUS CAP (MINS):</h4>
                <input type="number" id="max-bonus-input" placeholder="Max added time per day">
                <button class="btn-main" onclick="updateMaxBonus()">SET CAP</button>

                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                
                <h4 style="font-size:0.6rem; color:#888;">CHANGE PARENT PIN:</h4>
                <input type="password" id="new-pin-input" placeholder="Enter new 4-digit PIN" maxlength="4">
                <button class="btn-main" style="background:var(--accent)" onclick="changePin()">UPDATE PIN</button>

                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                
                <h4 style="font-size:0.6rem; color:#888;">MANAGE MISSIONS:</h4>
                <input type="text" id="custom-task-input" placeholder="Task Name">
                <input type="number" id="custom-task-xp" placeholder="XP Value">
                <button class="btn-main" onclick="addCustomTask()">ADD MISSION</button>
            </div>
        </div>
    </div>

    <script>
        let pin = localStorage.getItem('parentPin') || "1234";
        let maxBonus = parseInt(localStorage.getItem('maxBonus')) || 60; // Default max 60m extra
        let earnedBonusToday = parseInt(localStorage.getItem('earnedBonusToday')) || 0;

        const initialTasks = [{ name: "15 push-ups", xp: 20 }, { name: "Clean room", xp: 30 }];
        let taskPool = JSON.parse(localStorage.getItem('taskPool')) || initialTasks;
        let shopItems = JSON.parse(localStorage.getItem('shopItems')) || [{name: "New Game", cost: 500, greenLock: 5}];
        
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let totalXp = parseInt(localStorage.getItem('totalXp')) || 0;
        let lvl = parseInt(localStorage.getItem('lvl')) || 1;
        let statsHistory = JSON.parse(localStorage.getItem('statsHistory')) || {};
        let todayDate = new Date().toLocaleDateString('en-CA');

        if (!statsHistory[todayDate]) {
            statsHistory[todayDate] = { used: 0, allowed: 80 };
            earnedBonusToday = 0; // Reset bonus tracking for new day
        }

        let currentPinAttempt = ""; 
        let pinPurpose = ""; 
        let pendingShopIndex = null;

        window.onload = () => { 
            autoGenerateTask(); 
            updateUI(); 
            renderCalendar(); 
            document.getElementById('max-bonus-input').value = maxBonus;
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active'); // This turns the button green via CSS
            
            if(id === 'history') renderCalendar();
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.querySelector('.sidebar-overlay').classList.toggle('active'); 
        }

        function toggleShop() {
            const modal = document.getElementById('shop-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            renderShop();
        }

        function logTime() {
            let v = parseInt(document.getElementById('play-input').value);
            if(v >= 0) { 
                statsHistory[todayDate].used += v; 
                document.getElementById('play-input').value = ""; 
                save(); updateUI(); 
            }
        }

        function claimBounty() {
            // Task only adds 5 mins
            const bonusToAdd = 5;
            
            if (earnedBonusToday + bonusToAdd <= maxBonus) {
                statsHistory[todayDate].allowed += bonusToAdd;
                earnedBonusToday += bonusToAdd;
                xp += bountyXp;
                totalXp += bountyXp;
                if(xp >= 100) { xp -= 100; lvl++; }
                autoGenerateTask(); save(); updateUI();
                alert(`Bounty Claimed! +5m added.`);
            } else {
                alert(`Max bonus limit reached for today (${maxBonus}m). You still get XP!`);
                xp += bountyXp;
                totalXp += bountyXp;
                autoGenerateTask(); save(); updateUI();
            }
        }

        function changePin() {
            const newPin = document.getElementById('new-pin-input').value;
            if(newPin.length === 4 && !isNaN(newPin)) {
                pin = newPin;
                localStorage.setItem('parentPin', pin);
                alert("PIN Updated Successfully.");
                document.getElementById('new-pin-input').value = "";
            } else {
                alert("PIN must be 4 digits.");
            }
        }

        function updateMaxBonus() {
            maxBonus = parseInt(document.getElementById('max-bonus-input').value);
            localStorage.setItem('maxBonus', maxBonus);
            alert("Max Bonus Cap Updated.");
        }

        function openParent(purpose, data = null) {
            pinPurpose = purpose; pendingShopIndex = data; currentPinAttempt = "";
            document.getElementById('parent-modal').classList.add('open');
        }

        function closeParent() { document.getElementById('parent-modal').classList.remove('open'); }

        function pressKey(num) {
            if(currentPinAttempt.length < 4) {
                currentPinAttempt += num;
                updatePinDots();
                if(currentPinAttempt === pin) {
                    setTimeout(() => {
                        closeParent();
                        if(pinPurpose === 'bounty') claimBounty();
                        else if(pinPurpose === 'buy') finalizePurchase();
                        else showPage('parent');
                    }, 200);
                } else if(currentPinAttempt.length === 4) {
                    currentPinAttempt = ""; updatePinDots(); // Reset on wrong pin
                }
            }
        }

        function updatePinDots() { 
            const dots = document.querySelectorAll('.pin-dot'); 
            dots.forEach((dot, i) => dot.className = i < currentPinAttempt.length ? 'pin-dot filled' : 'pin-dot'); 
        }
        
        function pressBackspace() { currentPinAttempt = currentPinAttempt.slice(0, -1); updatePinDots(); }

        function autoGenerateTask() {
            const random = taskPool[Math.floor(Math.random() * taskPool.length)];
            currentTask = random.name; bountyXp = random.xp;
            document.getElementById('challenge-text').innerText = currentTask;
            document.getElementById('current-bounty-xp').innerText = bountyXp;
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            container.innerHTML = "";
            const now = new Date();
            document.getElementById('calendar-month-name').innerText = now.toLocaleString('default', { month: 'long' }).toUpperCase();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            for(let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let status = "";
                if (statsHistory[dateKey] && statsHistory[dateKey].used > 0) {
                    status = statsHistory[dateKey].used <= statsHistory[dateKey].allowed ? "cal-pass" : "cal-fail";
                }
                container.innerHTML += `<div class="cal-day ${status}">${d}</div>`;
            }
        }

        function save() {
            localStorage.setItem('xp', xp); 
            localStorage.setItem('totalXp', totalXp);
            localStorage.setItem('lvl', lvl); 
            localStorage.setItem('earnedBonusToday', earnedBonusToday);
            localStorage.setItem('statsHistory', JSON.stringify(statsHistory));
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = lvl;
            document.getElementById('header-lvl').innerText = lvl;
            document.getElementById('total-xp-display').innerText = totalXp;
            document.getElementById('xp-fill').style.width = Math.min(xp, 100) + "%";
            const today = statsHistory[todayDate];
            document.getElementById('today-usage-display').innerText = today.used + "m Used";
            document.getElementById('dynamic-limit-display').innerText = "Limit: " + today.allowed + "m (Max Bonus: " + maxBonus + "m)";
        }

        function askVision() {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<p style="color:var(--primary)">VISION: Stay consistent. Your habit is your strength.</p>`;
        }
    </script>
</body>
</html>
