<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up | AI Productivity</title>
    <style>
        /* --- DESIGN (CSS) --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            width: 380px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 { color: #00ff88; letter-spacing: 2px; margin-bottom: 5px; }
        p { color: #888; margin-top: 0; font-size: 0.9rem; }

        .stats-row {
            display: flex;
            justify-content: space-around;
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
        }

        .stat-val { color: #00d4ff; }

        .progress-box {
            background: #333;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        #bar {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;
        }

        .actions button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .task-btn { background: #333; color: white; border: 1px solid #444 !important; }
        .task-btn:hover { background: #444; }

        .ai-btn { background: #00d4ff; color: #121212; margin-top: 10px; }
        .ai-btn:hover { background: #00b8e6; transform: scale(1.02); }

        .ai-bubble {
            background: #252525;
            border-left: 4px solid #00d4ff;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85rem;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>LEVEL UP</h1>
        <p>Student Accountability System</p>

        <div class="stats-row">
            <div>LEVEL <span id="lvl" class="stat-val">1</span></div>
            <div>XP <span id="xp" class="stat-val">0</span> / 100</div>
        </div>

        <div class="progress-box">
            <div id="bar"></div>
        </div>

        <div class="actions">
            <button class="task-btn" onclick="gainXP(30, 'Study Session')">📚 Study Session (+30 XP)</button>
            <button class="task-btn" onclick="gainXP(20, 'Homework Complete')">📝 Homework (+20 XP)</button>
            <button class="task-btn" onclick="gainXP(15, 'Daily Chores')">🧹 Daily Chores (+15 XP)</button>
            
            <button class="ai-btn" onclick="runAI()">🤖 ASK LEVEL UP AI</button>
        </div>

        <div id="aiResponse" class="ai-bubble"></div>
    </div>

    <script>
        /* --- LOGIC (JavaScript) --- */
        let currentXP = 0;
        let currentLvl = 1;

        function gainXP(amount, taskName) {
            currentXP += amount;
            
            if (currentXP >= 100) {
                currentLvl++;
                currentXP -= 100;
                alert("🎉 LEVEL UP! You are now Level " + currentLvl + ". Reward Unlocked!");
            }

            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('xp').innerText = currentXP;
            document.getElementById('lvl').innerText = currentLvl;
            document.getElementById('bar').style.width = currentXP + "%";
        }

        function runAI() {
            const query = prompt("Ask the AI something (Try: 'tips', 'eye strain', or 'why gaming?'):").toLowerCase();
            const bubble = document.getElementById('aiResponse');
            bubble.style.display = "block";

            // AI Smart Logic based on your SPARC research
            if (query.includes("tip") || query.includes("how")) {
                bubble.innerHTML = "<strong>AI Assistant:</strong> To reach Level " + (currentLvl + 1) + " quickly, focus on your 30XP Study Sessions. Consistency is the best way to earn gaming time!";
            } 
            else if (query.includes("eye") || query.includes("strain") || query.includes("tired")) {
                bubble.innerHTML = "<strong>AI Assistant:</strong> Time for a break! Use the <strong>20-20-20 rule</strong>: Look at something 20 feet away for 20 seconds to protect your vision.";
            } 
            else if (query.includes("why") || query.includes("gaming") || query.includes("benefit")) {
                bubble.innerHTML = "<strong>AI Assistant:</strong> Research shows gaming can improve <strong>decision-making speed</strong> faster than some classes. Keep using it as a brain workout!";
            } 
            else {
                bubble.innerHTML = "<strong>AI Assistant:</strong> I'm monitoring your progress. You've earned " + currentXP + " XP today. Stay focused to unlock your rewards!";
            }
        }
    </script>
</body>
</html>
