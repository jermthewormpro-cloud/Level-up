<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level Up Your Day</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { 
            --neon: #00ff9d; --bg: #0d0d0d; --card-bg: #161616; 
            --gold: #ffc107; --red: #ff4757; --blue: #00d4ff; 
        }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-align: center; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* HEADER STYLING FROM SCREENSHOT */
        .neon-header { color: var(--neon); font-size: 1.8rem; margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 12px; text-shadow: 0 0 10px rgba(0, 255, 157, 0.3); }
        .subtitle { font-size: 0.8rem; color: #888; text-align: center; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* NAVIGATION GRID */
        .nav-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 30px; }
        .nav-btn { background: var(--neon); color: #000; border: none; padding: 12px 2px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.55rem; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
        .nav-btn i { font-size: 0.9rem; }
        .nav-btn:active { transform: scale(0.95); opacity: 0.8; }
        .nav-btn.settings { background: #1a1a1a; color: var(--neon); border: 1px solid var(--neon); }
        .nav-btn.power { background: var(--red); color: white; }

        .welcome-msg { font-family: 'Orbitron'; font-size: 1.4rem; margin-bottom: 25px; text-align: center; color: #fff; }

        /* PERFORMANCE STATS CARD */
        .card { background-color: #1a1a1a; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: center; margin-bottom: 10px; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .stat-val { font-family: 'Orbitron'; color: var(--neon); font-size: 1.6rem; font-weight: 700; }

        .progress-bar { height: 10px; background: #000; border-radius: 20px; margin-top: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        #xp-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #008cff); width: 0%; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); box-shadow: 0 0 15px var(--blue); }

        /* LOGGING SECTION */
        input { padding: 16px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; width: 100%; box-sizing: border-box; margin-bottom: 12px; text-align: center; font-family: 'Orbitron'; font-size: 0.9rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 255, 157, 0.2); }
        .action-btn { background: #1a6d4d; color: var(--neon); padding: 16px; border-radius: 12px; border: 1px solid var(--neon); font-family: 'Orbitron'; font-weight: 700; width: 100%; cursor: pointer; margin-top: 5px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .action-btn:hover { background: var(--neon); color: #000; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <section id="auth-section">
        <div class="card" style="margin-top: 60px;">
            <h2 id="auth-title">PLAYER LOGIN</h2>
            <div id="nickname-field" class="hidden">
                <input type="text" id="reg-nickname" placeholder="Player Nickname">
            </div>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button class="action-btn" id="main-auth-btn" onclick="handleAuth()" style="background: var(--neon); color: #000;">LOAD GAME</button>
            <p style="font-size: 0.75rem; text-align: center; margin-top: 20px; cursor: pointer; color: #888;" onclick="toggleAuth()" id="toggle-text">New Player? <span style="color: var(--neon)">Register</span></p>
        </div>
    </section>

    <div id="app-content" class="hidden">
        <div class="neon-header"><i class="fa-solid fa-gamepad"></i> Level Up Your Day</div>
        <div class="subtitle">Track stats. Build habits. Own your day.</div>

        <div class="nav-row">
            <button class="nav-btn" onclick="showTab('dash')"><i class="fa-solid fa-gauge-high"></i>DASH</button>
            <button class="nav-btn" onclick="showTab('cal')"><i class="fa-solid fa-calendar-days"></i>CAL</button>
            <button class="nav-btn" onclick="showTab('mission')"><i class="fa-solid fa-bullseye"></i>MISSION</button>
            <button class="nav-btn settings" onclick="showTab('parent')"><i class="fa-solid fa-gear"></i></button>
            <button class="nav-btn power" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="welcome-banner" class="welcome-msg">Welcome, Player</div>

        <section id="tab-dash">
            <div class="card">
                <h3 style="margin-top:0; font-size: 1rem; color: #fff;"><i class="fa-solid fa-star" style="color: var(--gold)"></i> Performance Stats</h3>
                <div class="stat-grid">
                    <div><span class="stat-label">Level</span><span id="disp-level" class="stat-val">1</span></div>
                    <div><span class="stat-label">Total XP</span><span id="disp-xp" class="stat-val">0</span></div>
                </div>
                <div class="progress-bar"><div id="xp-fill"></div></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0; font-size: 1rem; color: #fff;"><i class="fa-solid fa-bolt" style="color: var(--neon)"></i> Activity Log</h3>
                <input type="number" id="mins-input" placeholder="Minutes Worked">
                <button class="action-btn" onclick="vouchXP()">Vouch for XP</button>
            </div>
        </section>

        <section id="tab-mission" class="hidden">
            <div class="card">
                <h3 style="color:var(--blue); margin-top:0;"><i class="fa-solid fa-brain"></i> Vision AI Tutor</h3>
                <input type="text" id="ai-query" placeholder="Ask a question...">
                <button class="action-btn" style="border-color: var(--blue); color: var(--blue); background: transparent;" onclick="alert('AI Thinking...')">ASK AI</button>
            </div>
        </section>
        
        <section id="tab-parent" class="hidden">
            <div class="card">
                <h3 style="color:var(--gold); margin-top:0;"><i class="fa-solid fa-user-shield"></i> Parent Portal</h3>
                <input type="password" id="parent-pin" placeholder="Enter PIN">
                <button class="action-btn" style="border-color: var(--gold); color: var(--gold); background: transparent;" onclick="verifyParent()">UNLOCK</button>
                <div id="admin-panel" class="hidden">
                    <button class="action-btn" style="background: var(--gold); color: #000; margin-top: 20px;" onclick="approveXP()">APPROVE PENDING XP</button>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
let currentEmail = "";
let isRegMode = false;
let userData = { totalXP: 0, pendingXP: 0, nickname: "Player" };

function toggleAuth() {
    isRegMode = !isRegMode;
    document.getElementById('auth-title').innerText = isRegMode ? "PLAYER REGISTER" : "PLAYER LOGIN";
    document.getElementById('main-auth-btn').innerText = isRegMode ? "CREATE ACCOUNT" : "LOAD GAME";
    document.getElementById('toggle-text').innerHTML = isRegMode ? "Back to <span style='color: var(--neon)'>Login</span>" : "New Player? <span style='color: var(--neon)'>Register</span>";
    document.getElementById('nickname-field').classList.toggle('hidden', !isRegMode);
}

function handleAuth() {
    const e = document.getElementById('login-email').value.trim().toLowerCase();
    const p = document.getElementById('login-password').value.trim();
    const nick = document.getElementById('reg-nickname').value.trim();

    if(isRegMode) {
        if(!nick) return alert("Please enter a Nickname!");
        localStorage.setItem("user_" + e, JSON.stringify({...userData, nickname: nick, password: p}));
        alert("Account Created!"); toggleAuth();
    } else {
        let stored = JSON.parse(localStorage.getItem("user_" + e));
        if(stored && stored.password === p) {
            currentEmail = e; 
            userData = {...userData, ...stored}; 
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('welcome-banner').innerText = "Welcome, " + (userData.nickname || "Player");
            updateUI();
        } else { alert("Login failed."); }
    }
}

function updateUI() {
    const xp = parseInt(userData.totalXP) || 0;
    const level = Math.floor(xp / 100) + 1;
    document.getElementById('disp-xp').innerText = xp;
    document.getElementById('disp-level').innerText = level;
    document.getElementById('xp-fill').style.width = Math.max((xp % 100), 5) + "%";
}

function showTab(t) {
    document.querySelectorAll('section[id^="tab-"]').forEach(s => s.classList.add('hidden'));
    const target = document.getElementById('tab-' + t);
    if(target) target.classList.remove('hidden');
}

function vouchXP() {
    userData.pendingXP = parseInt(document.getElementById('mins-input').value) || 0;
    save(); alert("Vouched!");
    document.getElementById('mins-input').value = "";
}

function verifyParent() {
    if(document.getElementById('parent-pin').value === "1234") {
        document.getElementById('admin-panel').classList.remove('hidden');
    }
}

function approveXP() {
    userData.totalXP = (parseInt(userData.totalXP) || 0) + (parseInt(userData.pendingXP) || 0);
    userData.pendingXP = 0;
    save(); updateUI(); alert("XP Approved!");
}

function save() { localStorage.setItem("user_" + currentEmail, JSON.stringify(userData)); }
</script>
</body>
</html>
