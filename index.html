<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level Up! Tracker - Ultimate Edition</title>
    
    <link rel="icon" href="https://img.icons8.com/fluency/96/level-up.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/level-up.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --neon: #00ff9d; --bg: #0d0d0d; --card-bg: #161616; 
            --gold: #ffc107; --red: #ff4757; --orange: #ffa502; --blue: #00d4ff; --sidebar-w: 260px; 
        }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        h1 { color: var(--neon); font-size: 1.1rem; }

        /* Sidebar Navigation */
        .sidebar { position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; width: var(--sidebar-w); height: 100%; background: #111; border-right: 1px solid #333; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; font-family: 'Orbitron'; font-size: 0.75rem; color: #888; }
        .nav-active { color: var(--neon); background: #1a1a1a; border-left: 4px solid var(--neon); }

        header { padding: 15px 20px; display: flex; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #222; }
        .menu-btn { font-size: 1.4rem; color: var(--neon); cursor: pointer; margin-right: 20px; }
        
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; }
        
        /* Stats & Progress */
        .stat-val { font-family: 'Orbitron'; color: var(--neon); font-size: 1.6rem; display: block; font-weight: 700; }
        .progress-bar { height: 10px; background: #000; border-radius: 5px; margin-top: 8px; overflow: hidden; border: 1px solid #333; }
        #trust-fill { height: 100%; background: var(--blue); width: 0%; transition: 1s; }

        /* Feedback Zones */
        .feedback-box { padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: 600; font-size: 0.85rem; text-align: left; line-height: 1.4; border: 1px solid transparent; }
        .green-zone { border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 157, 0.05); }
        .orange-zone { border-color: var(--orange); color: var(--orange); background: rgba(255, 165, 2, 0.05); }
        .red-zone { border-color: var(--red); color: var(--red); background: rgba(255, 71, 87, 0.05); }

        /* Buttons & Inputs */
        button, .btn-label { padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; background: var(--neon); color: #000; font-family: 'Orbitron'; text-transform: uppercase; font-size: 0.75rem; width: 100%; display: block; margin-top: 10px; text-align: center; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        input { padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; text-align: center; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        #proof-preview { width: 100%; border-radius: 12px; display: none; margin-top: 15px; border: 2px solid var(--neon); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="nav-item nav-active" id="nav-dash" onclick="showTab('dash')"><i class="fa-solid fa-gamepad"></i> Dashboard</div>
    <div class="nav-item" id="nav-rewards" onclick="showTab('rewards')"><i class="fa-solid fa-trophy"></i> Reward Shop</div>
    <div class="nav-item" id="nav-parent" onclick="showTab('parent')" style="color:var(--gold)"><i class="fa-solid fa-user-shield"></i> Parent Portal</div>
    <div class="nav-item" onclick="location.reload()" style="margin-top:40px; color:var(--red);"><i class="fa-solid fa-power-off"></i> Logout</div>
</div>

<header><i class="fa-solid fa-bars menu-btn" onclick="toggleSidebar()"></i><h1>LEVEL UP! TRACKER</h1></header>

<div class="container">
    <section id="auth-section">
        <div class="card">
            <h2 id="auth-title">Player Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-password" placeholder="Password">
            <button id="auth-btn" onclick="handleAuth()">Enter Game</button>
            <p id="toggle-text" style="font-size: 0.7rem; margin-top: 15px; cursor: pointer; text-decoration: underline;" onclick="toggleAuthMode()">New player? Register here.</p>
        </div>
    </section>

    <div id="app-content" class="hidden">
        <section id="tab-dash">
            <div class="card" style="text-align: center;">
                <div style="display:grid; grid-template-columns: 1fr 1fr;">
                    <div><span style="font-size:0.6rem; color:#888;">LEVEL</span><span id="display-level" class="stat-val">1</span></div>
                    <div><span style="font-size:0.6rem; color:#888;">TOTAL XP</span><span id="display-xp" class="stat-val">0</span></div>
                </div>
                <div class="progress-bar"><div id="trust-fill"></div></div>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-brain"></i> Impact Coach</h3>
                <div id="ai-feedback" class="feedback-box">Logging your first session...</div>
                
                <div id="log-controls" style="margin-top:20px;">
                    <input type="number" id="xp-input-mins" placeholder="Minutes Worked/Played">
                    <label for="camera-input" class="btn-label" style="background:#222; color:var(--neon); border:1px dashed var(--neon);">
                        <i class="fa-solid fa-camera"></i> Snap Proof
                    </label>
                    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
                    <img id="proof-preview">
                    <button id="vouch-btn" onclick="vouchForXP()" disabled>Vouch for XP</button>
                </div>
            </div>
        </section>

        <section id="tab-rewards" class="hidden">
            <div class="card">
                <h3><i class="fa-solid fa-gift"></i> Reward Shop</h3>
                <div id="reward-display-list"></div>
            </div>
        </section>

        <section id="tab-parent" class="hidden">
            <div id="parent-lock-screen" class="card" style="border: 2px solid var(--gold); text-align:center;">
                <h3>Parent Access</h3>
                <input type="password" id="parent-pin-entry" placeholder="Enter PIN">
                <button style="background:var(--gold)" onclick="verifyParent()">Unlock Portal</button>
            </div>

            <div id="parent-admin-panel" class="hidden">
                <div class="card" style="border: 1px solid var(--gold);">
                    <h4 style="color:var(--gold)">Approve Claim</h4>
                    <span id="admin-pending-val" class="stat-val" style="color:var(--gold)">0 XP</span>
                    <div id="admin-image-review"></div>
                    <button style="background:var(--gold)" onclick="approveXP()">Approve XP</button>
                </div>
                
                <div class="card">
                    <h4 style="color:var(--gold)">Redeem Rewards</h4>
                    <div id="admin-claims-list"></div>
                </div>

                <div class="card">
                    <h4 style="color:var(--gold)">Settings</h4>
                    <p style="font-size:0.7rem; color:#888;">Daily Play Limit (Mins)</p>
                    <input type="number" id="parent-limit-input">
                    <button style="background:white; color:black;" onclick="updateDailyLimit()">Save Settings</button>
                </div>
                <button style="background:#333; color:white;" onclick="lockParent()">Lock Portal</button>
            </div>
        </section>
    </div>
</div>

<script>
// Data State
let currentEmail = "";
let isRegMode = false;
let userData = { 
    username: "", password: "", parentPin: "1234", active: false, 
    totalXP: 0, pendingXP: 0, dailyLimit: 120, todayMins: 0, 
    proofImg: null, rewards: [{name: "1hr Gaming", cost: 100}], claims: [] 
};

// --- AUTH & NAVIGATION ---
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function toggleAuthMode() {
    isRegMode = !isRegMode;
    document.getElementById('auth-title').innerText = isRegMode ? "Register Player" : "Player Login";
    document.getElementById('auth-btn').innerText = isRegMode ? "Create Account" : "Enter Game";
    document.getElementById('toggle-text').innerText = isRegMode ? "Already have an account? Login." : "New player? Register here.";
}

function showTab(t) {
    document.querySelectorAll('section[id^="tab-"]').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('nav-active'));
    document.getElementById('tab-'+t).classList.remove('hidden');
    document.getElementById('nav-'+(t==='dash'?'dash':t)).classList.add('nav-active');
    if(t === 'rewards') renderRewards();
    if(t === 'parent') {
        const lastLinked = localStorage.getItem("last_linked_child");
        if(lastLinked) { currentEmail = lastLinked; loadData(); }
    }
    toggleSidebar();
}

// --- CORE PLAYER LOGIC ---
function handlePhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('proof-preview').src = e.target.result;
            document.getElementById('proof-preview').style.display = 'block';
            userData.proofImg = e.target.result;
            document.getElementById('vouch-btn').disabled = false;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function vouchForXP() {
    const mins = parseInt(document.getElementById('xp-input-mins').value);
    if(!mins) return alert("Enter minutes!");
    userData.pendingXP = mins;
    save();
    alert("Photo & XP sent to Parent Portal!");
    document.getElementById('xp-input-mins').value = "";
    document.getElementById('proof-preview').style.display = 'none';
    document.getElementById('vouch-btn').disabled = true;
}

// --- REWARDS LOGIC ---
function renderRewards() {
    const list = document.getElementById('reward-display-list');
    list.innerHTML = "";
    userData.rewards.forEach(r => {
        const d = document.createElement('div'); d.className = "item-row";
        const canAfford = userData.totalXP >= r.cost;
        d.innerHTML = `<div><b>${r.name}</b><br><small>${r.cost} XP</small></div>
                       <button style="width:auto; margin:0; padding:8px 15px;" 
                       onclick="buyReward('${r.name}', ${r.cost})" ${!canAfford?'disabled':''}>Buy</button>`;
        list.appendChild(d);
    });
}

function buyReward(name, cost) {
    if(userData.totalXP >= cost) {
        userData.totalXP -= cost;
        userData.claims.push(name);
        save(); updateUI(); renderRewards();
        alert("Purchased! Ask parent to fulfill claim.");
    }
}

// --- PARENT PORTAL LOGIC ---
function verifyParent() {
    if(document.getElementById('parent-pin-entry').value === userData.parentPin) {
        document.getElementById('parent-lock-screen').classList.add('hidden');
        document.getElementById('parent-admin-panel').classList.remove('hidden');
        renderParentAdmin();
    } else alert("Invalid PIN");
}

function renderParentAdmin() {
    document.getElementById('admin-pending-val').innerText = userData.pendingXP + " XP";
    document.getElementById('admin-image-review').innerHTML = userData.proofImg ? `<img src="${userData.proofImg}" style="width:100%; border-radius:10px; margin-top:10px;">` : "<p style='color:#666'>No photo proof provided.</p>";
    document.getElementById('parent-limit-input').value = userData.dailyLimit;
    
    const cList = document.getElementById('admin-claims-list');
    cList.innerHTML = userData.claims.length ? "" : "<p style='color:#444'>No rewards waiting.</p>";
    userData.claims.forEach((c, i) => {
        const d = document.createElement('div'); d.className = "item-row";
        d.innerHTML = `<span>${c}</span><button onclick="clearClaim(${i})" style="width:auto; background:var(--gold); border:none; border-radius:5px; padding:5px 10px;">Done</button>`;
        cList.appendChild(d);
    });
}

function approveXP() {
    userData.todayMins += userData.pendingXP;
    userData.totalXP += userData.pendingXP;
    userData.pendingXP = 0;
    userData.proofImg = null;
    save(); updateUI(); renderParentAdmin();
    alert("XP Approved!");
}

function clearClaim(i) { userData.claims.splice(i, 1); save(); renderParentAdmin(); }

function updateDailyLimit() {
    userData.dailyLimit = parseInt(document.getElementById('parent-limit-input').value) || 120;
    save(); alert("Settings Saved!");
}

function lockParent() { 
    document.getElementById('parent-lock-screen').classList.remove('hidden'); 
    document.getElementById('parent-admin-panel').classList.add('hidden'); 
    showTab('dash'); 
}

// --- AUTH & DATA CORE ---
function handleAuth() {
    const e = document.getElementById("login-email").value.trim().toLowerCase();
    const p = document.getElementById("login-password").value.trim();
    if(isRegMode) {
        if(localStorage.getItem("user_" + e)) return alert("User exists!");
        userData.username = e.split('@')[0]; userData.password = p;
        localStorage.setItem("user_" + e, JSON.stringify(userData));
        localStorage.setItem("last_linked_child", e);
        alert("Registered!"); toggleAuthMode();
    } else {
        let stored = JSON.parse(localStorage.getItem("user_" + e));
        if(stored && stored.password === p) {
            currentEmail = e; userData = stored;
            document.getElementById("auth-section").classList.add("hidden");
            document.getElementById("app-content").classList.remove("hidden");
            updateUI();
        } else alert("Login failed.");
    }
}

function updateUI() {
    document.getElementById('display-xp').innerText = userData.totalXP;
    const lvl = Math.floor(userData.totalXP / 100) + 1;
    document.getElementById('display-level').innerText = lvl;
    document.getElementById('trust-fill').style.width = Math.min((lvl/10)*100, 100) + "%";
    
    const fb = document.getElementById('ai-feedback');
    const percent = (userData.todayMins / userData.dailyLimit) * 100;
    fb.className = "feedback-box";
    if(percent < 50) { fb.innerHTML = "✨ <b>Green Zone:</b> Perfect balance!"; fb.classList.add('green-zone'); }
    else if(percent < 90) { fb.innerHTML = "⚠️ <b>Orange Zone:</b> Getting close! Rest your eyes."; fb.classList.add('orange-zone'); }
    else { fb.innerHTML = "🛑 <b>Red Zone:</b> Limit reached. Go outside!"; fb.classList.add('red-zone'); }
}

function save() { localStorage.setItem("user_" + currentEmail, JSON.stringify(userData)); }
function loadData() { let stored = localStorage.getItem("user_" + currentEmail); if(stored) userData = JSON.parse(stored); updateUI(); }

updateUI();
</script>
</body>
</html>
