<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --accent: #00d4ff;
            --gemini-blue: #4285f4;
            --gemini-purple: #9b72cb;
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --border: #333;
            --danger: #ff4444;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: #111; border-right: 1px solid var(--border);
            transition: 0.3s ease; z-index: 2000; padding: 25px;
        }
        #sidebar.open { left: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }
        .sidebar-overlay.active { display: block; }

        /* --- LAYOUT --- */
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .nav-btn {
            flex: 1; background: var(--card); border: 1px solid var(--border);
            color: #888; padding: 10px; border-radius: 12px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 0.55rem; transition: 0.2s;
        }
        .nav-btn.active { border-color: var(--primary); color: var(--primary); background: #222; }

        /* --- CARDS & PAGES --- */
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .page { display: none; flex-grow: 1; }
        .page.active { display: block; }

        /* --- VISION (GEMINI STYLE) --- */
        #page-vision.active { display: flex; flex-direction: column; height: calc(100vh - 160px); }
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #333; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: linear-gradient(135deg, #1e1e1e, #252525); border: 1px solid #444; border-bottom-left-radius: 4px; }
        .ai-glow { color: transparent; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; background-clip: text; font-weight: bold; font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 4px; display: block; }
        
        .chat-input-area { display: flex; gap: 10px; background: #1a1a1a; padding: 10px; border-radius: 15px; border: 1px solid #333; }
        .chat-input-area input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; padding: 5px; }

        /* --- HISTORY CALENDAR --- */
        .history-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .day-box { aspect-ratio: 1; border-radius: 8px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #444; border: 1px solid #333; }
        .day-green { background: var(--success) !important; color: white !important; border: none; box-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        .day-red { background: var(--danger) !important; color: white !important; border: none; box-shadow: 0 0 10px rgba(255, 68, 68, 0.3); }

        /* --- UTILS --- */
        .btn-main { background: var(--primary); border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Orbitron'; color: #000; }
        input[type="number"] { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width:320px; text-align:center;">
            <h1 style="font-family:'Orbitron'; color:var(--primary); letter-spacing: 2px;">LEVEL UP</h1>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()" class="btn-main">INITIALIZE</button>
        </div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--primary); font-size: 1rem;">SYSTEM</h2>
        <hr style="border:0; border-top:1px solid #333; margin-bottom:20px;">
        <button class="btn-main" style="background:var(--accent); font-size:0.7rem;" onclick="parentAccess()">PARENT PORTAL</button>
        <button onclick="logout()" style="position:absolute; bottom:30px; background:none; border:none; color:var(--danger); cursor:pointer; font-family:'Orbitron'; font-size:0.8rem;">LOG OUT</button>
    </div>

    <div class="container" id="main-app" style="display:none;">
        <div class="header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">☰</button>
            <h1 style="font-family:'Orbitron'; font-size: 0.8rem; margin:0; letter-spacing: 2px; color:var(--primary);">STATUS: ACTIVE</h1>
            <div style="width:30px;"></div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" id="btn-dash" onclick="showPage('dash')">DASH</button>
            <button class="nav-btn" id="btn-mission" onclick="showPage('mission')">BOUNTY</button>
            <button class="nav-btn" id="btn-vision" onclick="showPage('vision')">VISION</button>
            <button class="nav-btn" id="btn-cal" onclick="showPage('cal')">HISTORY</button>
        </div>

        <div id="page-dash" class="page active">
            <div class="card" style="text-align:center;">
                <p style="font-size:0.6rem; color:#888; letter-spacing:1px; margin-bottom:5px;">CURRENT RANK</p>
                <h2 id="lvl-display" style="font-family:'Orbitron'; color:var(--primary); font-size:4rem; margin:0;">1</h2>
                <div style="background:#333; height:6px; border-radius:10px; margin: 15px 0;"><div id="xp-fill" style="background:var(--primary); height:100%; width:0%; transition:0.8s; border-radius:10px;"></div></div>
                <p id="xp-label" style="font-size:0.6rem; color:#666;">0/100 XP</p>
            </div>
            
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <p style="color:#888; font-size: 0.7rem;">PLAYTIME LOG</p>
                    <p id="remaining-display" style="font-size:0.7rem; font-weight:bold; color:var(--primary);">80m Left</p>
                </div>
                <h1 id="today-usage-display" style="margin:5px 0; font-family:'Orbitron'; color:white;">0m Used</h1>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <input type="number" id="play-input" placeholder="Minutes to log...">
                <button class="btn-main" onclick="logTime()">UPDATE LOG</button>
            </div>
        </div>

        <div id="page-mission" class="page">
            <div class="card" style="background: #111; border-left: 4px solid var(--primary);">
                <span style="color:var(--accent); font-size: 0.6rem; font-weight: bold; letter-spacing: 1px;">GAMING INTEL</span>
                <p id="fact-text" style="font-size:0.9rem; margin: 10px 0; line-height: 1.6;">...</p>
                <div style="background:#000; padding:15px; border-radius:10px; border: 1px dashed var(--primary); margin: 15px 0;">
                    <span style="display:block; font-size:0.6rem; color:var(--primary); margin-bottom:5px;">OBJECTIVE:</span>
                    <span id="challenge-text" style="font-weight:600;">...</span>
                </div>
                <button class="btn-main" onclick="verifyMission()">COMPLETE CHALLENGE</button>
            </div>
        </div>

        <div id="page-vision" class="page">
            <div class="chat-container" id="chat-box">
                <div class="message ai-msg">
                    <span class="ai-glow">VISION</span>
                    I am Vision. How can I help you level up your knowledge today?
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask Vision anything...">
                <button onclick="askVision()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold;">SEND</button>
            </div>
        </div>

        <div id="page-cal" class="page">
            <div class="card">
                <h3 style="font-family:'Orbitron'; font-size: 0.8rem; margin-top:0;">PROGRESS LOG</h3>
                <p style="font-size: 0.6rem; color: #666; margin-bottom:15px;">Daily Limit: 80 Minutes</p>
                <div class="history-grid" id="calendar-grid"></div>
                <div style="margin-top:20px; display:flex; gap:15px; font-size:0.6rem;">
                    <span><span style="color:var(--success)">●</span> Success</span>
                    <span><span style="color:var(--danger)">●</span> Overlimit</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DAILY_LIMIT = 80;

        const facts = [
            "The enderman language is just English backwards and slowed down.",
            "Minecraft was originally called 'Cave Game'.",
            "A person has played the Wii Sports theme over 5 million times on YouTube.",
            "The 'Mew' under the truck in Pokémon was just an urban legend.",
            "Roblox was originally called 'DynaBlocks'.",
            "Super Mario's cloud and bush are actually the same sprite, just colored differently.",
            "The longest video game name is over 100 characters long.",
            "Esports is now a billion-dollar industry.",
            "In Halo, the 'Warthog' was almost named the 'Mauler'.",
            "Fortnite's 'Save the World' mode was in development for 6 years."
        ];

        const challenges = [
            "Do 15 push-ups.",
            "Do a 45-second plank.",
            "Drink 2 full glasses of water.",
            "Organize your gaming desk for 2 minutes.",
            "Go outside and take 50 steps.",
            "Do 20 jumping jacks.",
            "Read 5 pages of any book.",
            "Clean up 5 pieces of trash in your room.",
            "Stretch your neck and back for 2 minutes.",
            "Find a family member and tell them a fact."
        ];

        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let lvl = parseInt(localStorage.getItem('lvl')) || 1;
        let history = JSON.parse(localStorage.getItem('gameHistory')) || {};
        let todayStr = new Date().toLocaleDateString();
        let todayMins = parseInt(localStorage.getItem('todayMins_' + todayStr)) || 0;

        window.onload = () => {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                newMission();
                renderCalendar();
            }
            updateUI();
        };

        function handleLogin() { localStorage.setItem('isLoggedIn', 'true'); location.reload(); }
        function logout() { localStorage.setItem('isLoggedIn', 'false'); location.reload(); }
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
            if(pageId === 'mission') newMission();
            if(pageId === 'cal') renderCalendar();
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        }

        function newMission() {
            document.getElementById('fact-text').innerText = facts[Math.floor(Math.random() * facts.length)];
            document.getElementById('challenge-text').innerText = challenges[Math.floor(Math.random() * challenges.length)];
        }

        function logTime() {
            const input = document.getElementById('play-input');
            const newMins = parseInt(input.value);
            if (newMins > 0) {
                todayMins += newMins;
                history[todayStr] = (todayMins <= DAILY_LIMIT) ? 'green' : 'red';
                input.value = "";
                save();
                updateUI();
                if(todayMins > DAILY_LIMIT) alert("LIMIT EXCEEDED: Today is marked RED.");
            }
        }

        function verifyMission() {
            let pin = prompt("PARENT VERIFICATION\nEnter PIN:");
            if(pin === "1234") {
                xp += 35;
                if(xp >= 100) { xp -= 100; lvl++; alert("RANK UP!"); }
                save();
                updateUI();
                newMission();
            } else { alert("Incorrect PIN."); }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            for(let i = 13; i >= 0; i--) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let dateStr = d.toLocaleDateString();
                let box = document.createElement('div');
                box.className = 'day-box';
                box.innerText = d.getDate();
                if(history[dateStr] === 'green') box.classList.add('day-green');
                if(history[dateStr] === 'red') box.classList.add('day-red');
                grid.appendChild(box);
            }
        }

        function askVision() {
            let input = document.getElementById('chat-input');
            let box = document.getElementById('chat-box');
            if(!input.value) return;
            
            box.innerHTML += `<div class="message user-msg">${input.value}</div>`;
            let val = input.value;
            input.value = "";
            
            setTimeout(() => {
                box.innerHTML += `
                    <div class="message ai-msg">
                        <span class="ai-glow">VISION</span>
                        Analyzing "${val}"... Based on Level ${lvl} parameters, I suggest focusing on core concepts. I'm here if you need a deeper explanation.
                    </div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
        }

        function save() {
            localStorage.setItem('xp', xp);
            localStorage.setItem('lvl', lvl);
            localStorage.setItem('gameHistory', JSON.stringify(history));
            localStorage.setItem('todayMins_' + todayStr, todayMins);
        }

        function updateUI() {
            document.getElementById('xp-fill').style.width = xp + "%";
            document.getElementById('xp-label').innerText = xp + "/100 XP";
            document.getElementById('lvl-display').innerText = lvl;
            document.getElementById('today-usage-display').innerText = todayMins + "m Used";
            let rem = DAILY_LIMIT - todayMins;
            document.getElementById('remaining-display').innerText = rem > 0 ? rem + "m Left" : "Over Limit";
            document.getElementById('remaining-display').style.color = rem >= 0 ? "var(--primary)" : "var(--danger)";
        }

        function parentAccess() { if(prompt("Parent PIN:") === "1234") alert("Unlocked."); }
    </script>
</body>
</html>
