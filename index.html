<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --accent: #00d4ff;
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --border: #333;
            --danger: #ff4444;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: #111; border-right: 1px solid var(--border);
            transition: 0.3s ease; z-index: 2000; padding: 25px;
        }
        #sidebar.open { left: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }
        .sidebar-overlay.active { display: block; }

        /* --- LAYOUT --- */
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; }
        .nav-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-shrink: 0; }
        .nav-btn {
            flex: 1; background: var(--card); border: 1px solid var(--border);
            color: #888; padding: 10px; border-radius: 12px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 0.55rem;
        }
        .nav-btn.active { border-color: var(--primary); color: var(--primary); background: #222; }

        /* --- PAGES --- */
        .page { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }

        /* --- VISION AI --- */
        #page-vision.active { display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 0.85rem; }
        .user-msg { align-self: flex-end; background: #333; }
        .ai-msg { align-self: flex-start; background: #222; border: 1px solid #444; }
        .ai-glow { background: linear-gradient(90deg, #4285f4, #9b72cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 0.7rem; display: block; }

        /* --- PARENT MODAL --- */
        #parent-modal {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 4000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
        }
        #parent-modal.open { top: 0; }
        .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--primary); margin: 0 10px; }
        .pin-dot.filled { background: var(--primary); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .key { width: 70px; height: 70px; border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; cursor: pointer; font-size: 1.2rem; }
        .key:active { background: var(--primary); color: #000; }
        .key.backspace { border-color: var(--danger); color: var(--danger); font-size: 1.5rem; }

        /* --- UI ELEMENTS --- */
        .btn-main { background: var(--primary); border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Orbitron'; color: #000; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .history-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-box { aspect-ratio: 1; border-radius: 8px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; border: 1px solid #333; }
        .day-green { background: var(--success) !important; color: white; border: none; }
        .day-red { background: var(--danger) !important; color: white; border: none; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="parent-modal">
        <button onclick="closeParent()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        <h2 style="font-family:'Orbitron'; color:var(--primary);">ADMIN ACCESS</h2>
        <div style="display:flex; margin: 20px 0;" id="pin-display">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
            <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
            <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
            <div class="key backspace" onclick="pressBackspace()">⌫</div><div class="key" onclick="pressKey(0)">0</div>
        </div>
    </div>

    <div id="login-screen">
        <div class="card" style="width:300px; text-align:center;">
            <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:1.2rem;">LEVEL UP</h1>
            <input type="password" id="login-pass" placeholder="Master Password">
            <button onclick="handleLogin()" class="btn-main">SYSTEM BOOT</button>
        </div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--primary); font-size: 1rem;">MENU</h2>
        <hr style="border:0; border-top:1px solid #333; margin-bottom:20px;">
        <button class="btn-main" style="background:var(--accent); font-size:0.6rem;" onclick="openParent()">🛡️ PARENT PORTAL</button>
        <button onclick="logout()" style="position:absolute; bottom:30px; background:none; border:none; color:var(--danger); cursor:pointer; font-family:'Orbitron';">SHUT DOWN</button>
    </div>

    <div class="container" id="main-app" style="display:none;">
        <div class="header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem;">☰</button>
            <h1 style="font-family:'Orbitron'; font-size: 0.8rem; color:var(--primary);">LVL: <span id="header-lvl">1</span></h1>
            <div style="width:30px;"></div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" id="btn-dash" onclick="showPage('dash')">DASH</button>
            <button class="nav-btn" id="btn-mission" onclick="showPage('mission')">BOUNTY</button>
            <button class="nav-btn" id="btn-vision" onclick="showPage('vision')">VISION</button>
            <button class="nav-btn" id="btn-cal" onclick="showPage('cal')">HISTORY</button>
        </div>

        <div id="page-dash" class="page active">
            <div class="card" style="text-align:center;">
                <h2 id="lvl-display" style="font-family:'Orbitron'; color:var(--primary); font-size:3.5rem; margin:0;">1</h2>
                <div style="background:#333; height:6px; border-radius:10px; margin: 15px 0;"><div id="xp-fill" style="background:var(--primary); height:100%; width:0%;"></div></div>
                <p id="xp-label" style="font-size:0.6rem; color:#666;">XP PROGRESS</p>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 id="today-usage-display" style="margin:0; font-family:'Orbitron';">0m Used</h3>
                    <p id="remaining-display" style="font-size:0.7rem; font-weight:bold; color:var(--primary);">80m Left</p>
                </div>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <input type="number" id="play-input" placeholder="Minutes used">
                <button class="btn-main" onclick="logTime()">UPDATE LOG</button>
            </div>
        </div>

        <div id="page-mission" class="page">
            <div class="card" style="border-left:4px solid var(--primary);">
                <span style="color:var(--accent); font-size:0.6rem; font-weight:bold;">DAILY FACT</span>
                <p id="fact-text" style="font-size:0.9rem; margin:10px 0;">Loading intel...</p>
                <div style="background:#000; padding:15px; border-radius:10px; border:1px dashed var(--primary); margin:15px 0;">
                    <span id="challenge-text" style="font-weight:600;">Quest loading...</span>
                </div>
                <button class="btn-main" onclick="openParent()">VERIFY TO CLAIM XP</button>
            </div>
        </div>

        <div id="page-vision" class="page">
            <div class="chat-container" id="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask Vision...">
                <button onclick="askVision()" style="background:none; border:none; color:var(--accent); font-weight:bold;">SEND</button>
            </div>
        </div>

        <div id="page-cal" class="page">
            <div class="card">
                <h3 style="font-family:'Orbitron'; font-size:0.8rem; margin-top:0;">PROGRESS HISTORY</h3>
                <div class="history-grid" id="calendar-grid"></div>
            </div>
        </div>

        <div id="page-parent" class="page">
            <div class="card">
                <h3 style="font-family:'Orbitron'; color:var(--accent); margin-top:0;">PARENT SETTINGS</h3>
                <button class="btn-main" style="background:#444; color:white;" onclick="resetToday()">RESET TODAY'S TIME</button>
                <button class="btn-main" style="background:#444; color:white;" onclick="clearHistory()">WIPE ALL HISTORY</button>
                
                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                
                <h4 style="font-size:0.7rem; color:#888; font-family:'Orbitron';">CHANGE PARENT PIN</h4>
                <input type="password" id="new-pin-input" maxlength="4" placeholder="Enter new 4-digit PIN">
                <button class="btn-main" style="background:var(--accent); color:black;" onclick="changePin()">UPDATE PIN</button>
                
                <button class="btn-main" onclick="showPage('dash')">EXIT SETTINGS</button>
            </div>
        </div>
    </div>

    <script>
        let DAILY_LIMIT = 80;
        const facts = ["Tetris was the first game in space.", "Minecraft's Creeper was a coding error.", "Pac-Man was originally 'Puck-Man'.", "Mario was first named 'Jumpman'."];
        const challenges = ["10 Push-ups", "10m Outdoor Walk", "Drink 1 glass of water", "Clean gaming area"];

        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let lvl = parseInt(localStorage.getItem('lvl')) || 1;
        let history = JSON.parse(localStorage.getItem('gameHistory')) || {};
        let parentPin = localStorage.getItem('parentPin') || "1234";
        let todayMins = parseInt(localStorage.getItem('todayMins_' + new Date().toLocaleDateString())) || 0;
        let currentPinAttempt = "";

        window.onload = () => {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                newMission();
                renderCalendar();
            }
            updateUI();
        };

        function handleLogin() { localStorage.setItem('isLoggedIn', 'true'); location.reload(); }
        function logout() { localStorage.setItem('isLoggedIn', 'false'); location.reload(); }
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if(document.getElementById('btn-' + pageId)) document.getElementById('btn-' + pageId).classList.add('active');
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        }

        /* --- PIN LOGIC --- */
        function openParent() { 
            currentPinAttempt = "";
            updatePinDots();
            document.getElementById('parent-modal').classList.add('open'); 
        }
        function closeParent() { document.getElementById('parent-modal').classList.remove('open'); }

        function pressKey(num) {
            if(currentPinAttempt.length < 4) {
                currentPinAttempt += num;
                updatePinDots();
                if(currentPinAttempt === parentPin) {
                    setTimeout(() => {
                        closeParent();
                        showPage('parent');
                    }, 200);
                } else if (currentPinAttempt.length === 4) {
                    setTimeout(() => {
                        alert("Incorrect PIN");
                        currentPinAttempt = "";
                        updatePinDots();
                    }, 200);
                }
            }
        }

        function pressBackspace() {
            currentPinAttempt = currentPinAttempt.slice(0, -1);
            updatePinDots();
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                dot.className = i < currentPinAttempt.length ? 'pin-dot filled' : 'pin-dot';
            });
        }

        function changePin() {
            const newPin = document.getElementById('new-pin-input').value;
            if(newPin.length === 4 && !isNaN(newPin)) {
                parentPin = newPin;
                localStorage.setItem('parentPin', parentPin);
                document.getElementById('new-pin-input').value = "";
                alert("PIN successfully changed!");
            } else {
                alert("Please enter a valid 4-digit number.");
            }
        }

        /* --- CORE LOGIC --- */
        function logTime() {
            let input = document.getElementById('play-input');
            let val = parseInt(input.value);
            if(val > 0) {
                todayMins += val;
                history[new Date().toLocaleDateString()] = (todayMins <= DAILY_LIMIT) ? 'green' : 'red';
                input.value = "";
                save(); updateUI(); renderCalendar();
            }
        }

        function resetToday() { todayMins = 0; save(); updateUI(); alert("Time reset!"); }
        function clearHistory() { if(confirm("Wipe all history?")){history = {}; save(); renderCalendar(); alert("Wiped!");} }

        function save() {
            localStorage.setItem('xp', xp); localStorage.setItem('lvl', lvl);
            localStorage.setItem('gameHistory', JSON.stringify(history));
            localStorage.setItem('todayMins_' + new Date().toLocaleDateString(), todayMins);
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = lvl;
            document.getElementById('header-lvl').innerText = lvl;
            document.getElementById('xp-fill').style.width = xp + "%";
            document.getElementById('today-usage-display').innerText = todayMins + "m Used";
            let rem = DAILY_LIMIT - todayMins;
            document.getElementById('remaining-display').innerText = rem >= 0 ? rem + "m Left" : "OVER LIMIT";
            document.getElementById('remaining-display').style.color = rem >= 0 ? "var(--primary)" : "var(--danger)";
        }

        function newMission() {
            document.getElementById('fact-text').innerText = facts[Math.floor(Math.random() * facts.length)];
            document.getElementById('challenge-text').innerText = challenges[Math.floor(Math.random() * challenges.length)];
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            for(let i = 13; i >= 0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dateStr = d.toLocaleDateString();
                let box = document.createElement('div');
                box.className = 'day-box'; box.innerText = d.getDate();
                if(history[dateStr] === 'green') box.classList.add('day-green');
                if(history[dateStr] === 'red') box.classList.add('day-red');
                grid.appendChild(box);
            }
        }

        function askVision() {
            let input = document.getElementById('chat-input');
            let box = document.getElementById('chat-box');
            if(!input.value) return;
            box.innerHTML += `<div class="message user-msg">${input.value}</div>`;
            let userVal = input.value;
            input.value = "";
            setTimeout(() => {
                box.innerHTML += `<div class="message ai-msg"><span class="ai-glow">VISION</span>Analyzing data... continue your progress to unlock more insights.</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
