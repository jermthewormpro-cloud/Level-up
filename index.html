<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>level-up-your-day</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --neon: #00ff9d; --purple: #a29bfe; --bg: #121212; --card-bg: #1e1e1e; 
            --gold: #ffc107; --blue: #00d4ff; --sidebar-w: 260px;
        }

        body { 
            background: linear-gradient(135deg, var(--bg) 0%, #1a1a1a 100%); 
            color: #e0e0e0; font-family: 'Inter', sans-serif; text-align: center; 
            padding: 0; min-height: 100vh; margin: 0; overflow-x: hidden; 
        }

        h1, h2, h3 { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        h1 { color: var(--neon); text-shadow: 0 0 15px rgba(0, 255, 157, 0.4); margin: 0; font-size: 1.2rem; }

        /* SIDEBAR */
        .sidebar { 
            position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; 
            width: var(--sidebar-w); height: 100%; background: #111; 
            border-right: 1px solid #333; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; padding-top: 60px; text-align: left;
        }
        .sidebar.open { left: 0; }
        .nav-item { 
            padding: 18px 25px; cursor: pointer; display: flex; align-items: center; 
            gap: 15px; border-bottom: 1px solid #222; font-family: 'Orbitron'; 
            font-size: 0.75rem; color: #888; transition: 0.2s;
        }
        .nav-item:hover { background: #1a1a1a; color: var(--neon); }
        .nav-active { color: var(--neon); background: #1a1a1a; border-left: 4px solid var(--neon); }

        /* HEADER */
        header { 
            padding: 15px 20px; display: flex; align-items: center; 
            background: rgba(0,0,0,0.9); position: sticky; top: 0; 
            z-index: 999; border-bottom: 1px solid #222;
        }
        .menu-btn { font-size: 1.4rem; color: var(--neon); cursor: pointer; margin-right: 20px; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
