<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level Up! Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --neon: #00ff9d; --bg: #0d0d0d; --card-bg: #161616; 
            --gold: #ffc107; --red: #ff4757; --blue: #00d4ff; 
        }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 900; }
        .logo { font-family: 'Orbitron'; font-weight: 700; color: var(--neon); font-size: 1.1rem; letter-spacing: 1px; }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background-color: #161616; border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a2a; }

        /* MISSION & TASK STYLING */
        .mission-header { font-family: 'Orbitron'; color: #fff; font-size: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .task-container { background: #222; border-radius: 12px; padding: 15px; border-left: 5px solid var(--red); margin-bottom: 15px; }
        .task-row { display: flex; align-items: center; gap: 12px; }
        .checkbox { width: 22px; height: 22px; border: 2px solid var(--red); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .checkbox.checked { background: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .checkbox.checked i { color: #000; display: block !important; }

        /* CALENDAR & STATS */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: center; }
        .stat-value { font-family: 'Orbitron'; color: var(--neon); font-size: 1.4rem; }
        .stat-label { font-size: 0.65rem; color: #777; text-transform: uppercase; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-day { font-size: 0.75rem; padding: 8px 0; border-radius: 6px; background: #222; text-align: center; }
        .goal-met { background: var(--neon) !important; color: #000 !important; font-weight: bold; }
        .goal-missed { background: var(--red) !important; }

        /* BUTTONS */
        .action-btn { background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 10px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        input, textarea { padding: 12px; border-radius: 10px; border: 1px solid #333; background: #080808; color: white; width: 100%; box-sizing: border-box; outline: none; font-family: 'Orbitron'; }

        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; left: 0; background-color: #0a0a0a; overflow-x: hidden; transition: 0.4s; padding-top: 60px; border-right: 1px solid #333; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 1rem; color: #aaa; display: flex; align-items: center; gap: 15px; font-family: 'Orbitron'; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
    <span style="position:absolute;top:10px;right:20px;font-size:30px;color:var(--neon);cursor:pointer;" onclick="closeNav()">&times;</span>
    <a onclick="showSection('home')"><i class="fa-solid fa-house"></i> Home</a>
    <a onclick="showSection('parent')"><i class="fa-solid fa-user-shield" style="color:var(--gold)"></i> Parent Portal</a>
</div>

<div class="top-nav">
    <i class="fa-solid fa-bars" style="color:var(--neon); cursor:pointer;" onclick="openNav()"></i>
    <div class="logo">LEVEL UP</div>
    <div style="width:24px"></div>
</div>

<div class="container">
    
    <div id="section-home">
        <div class="card">
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-label">7-Day Avg</span><br><span class="stat-value" id="avg-display">0m</span></div>
                <div class="stat-box"><span class="stat-label">Streak</span><br><span class="stat-value" id="streak-display">0d</span></div>
            </div>
        </div>

        <div class="card" style="border: 1px solid var(--neon);">
            <div style="font-family:'Orbitron'; font-size:0.9rem; margin-bottom:10px;"><i class="fa-solid fa-clock"></i> Log Playtime</div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="mins-input" placeholder="Minutes">
                <button class="action-btn" style="margin:0; width:auto; padding:0 20px;" onclick="logTime()">LOG</button>
            </div>
        </div>

        <div class="card">
            <div class="mission-header"><i class="fa-solid fa-bullseye" style="color:var(--red)"></i> Current Mission</div>
            
            <div class="task-container">
                <div class="task-row">
                    <div id="task-check" class="checkbox" onclick="toggleTask()">
                        <i class="fa-solid fa-check hidden"></i>
                    </div>
                    <div>
                        <span class="stat-label" style="color:var(--red)">Active Task:</span>
                        <p id="task-display" style="margin:2px 0; font-weight:600; font-size:0.9rem;"></p>
                    </div>
                </div>
            </div>

            <div style="background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px dashed #444;">
                <div style="font-family:'Orbitron'; font-size:0.7rem; color:var(--gold); margin-bottom:5px;">
                    <i class="fa-solid fa-lightbulb"></i> Gaming Fact
                </div>
                <p id="fact-display" style="font-size:0.8rem; font-style:italic; color:#bbb; margin:0; line-height:1.4;"></p>
            </div>
        </div>

        <div class="card">
            <div style="font-family:'Orbitron'; font-size:0.9rem; margin-bottom:10px;"><i class="fa-solid fa-calendar-days" style="color:var(--neon)"></i> Goal Tracker</div>
            <div class="cal-grid" id="calendar-days">
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">S</div>
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">M</div>
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">T</div>
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">W</div>
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">T</div>
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">F</div>
                <div style="color:var(--neon); font-size:0.6rem; text-align:center;">S</div>
            </div>
        </div>

        <div class="card">
            <div style="font-family:'Orbitron'; font-size:0.9rem; margin-bottom:10px;"><i class="fa-solid fa-robot" style="color:var(--blue)"></i> AI Tutor</div>
            <textarea id="ai-input" rows="2" placeholder="Ask a question..."></textarea>
            <button class="action-btn" style="background:var(--blue); color:white;" onclick="askAI()">ASK BRAIN</button>
            <p id="ai-response" style="font-size:0.8rem; color:#ccc; margin-top:10px;"></p>
        </div>
    </div>

    <div id="section-parent" class="hidden">
        <div class="card">
            <div style="font-family:'Orbitron'; margin-bottom:15px;">Parent Access</div>
            <div id="parent-lock">
                <input type="password" id="pin" placeholder="Enter PIN">
                <button class="action-btn" style="background:var(--gold);" onclick="unlockParent()">Unlock</button>
            </div>
            <div id="parent-controls" class="hidden">
                <span class="stat-label">Daily Goal (Min)</span>
                <input type="number" id="goal-input" style="margin-bottom:15px;">
                <button class="action-btn" onclick="setGoal()">Update Goal</button>
                <p id="pending-msg" style="color:var(--neon); margin: 20px 0; font-family:'Orbitron';"></p>
                <button class="action-btn" style="background:white;" onclick="approve()">Approve Session</button>
            </div>
        </div>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("levelUpData")) || {
    logs: [], pending: 0, cal: {}, goal: 120, streak: 0, taskDone: false
};

const missionPool = [
    { task: "Go outside for a bit and breathe fresh air.", fact: "Nature resets your attention span, making you better at strategy games." },
    { task: "Drink a full glass of water.", fact: "Dehydration causes brain fog. Water keeps your reaction time fast." },
    { task: "Stretch your wrists and back for 2 minutes.", fact: "Pro gamers stretch to avoid injury and stay in the game longer." },
    { task: "Look at something 20 feet away for 20 seconds.", fact: "This prevents 'Gamer Eye' strain and keeps your vision sharp." }
];

function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
function showSection(s) {
    closeNav();
    document.getElementById('section-home').classList.toggle('hidden', s !== 'home');
    document.getElementById('section-parent').classList.toggle('hidden', s !== 'parent');
}

function toggleTask() {
    data.taskDone = !data.taskDone;
    document.getElementById('task-check').classList.toggle('checked', data.taskDone);
    save();
}

function logTime() {
    let val = document.getElementById('mins-input').value;
    if(!val) return;
    data.pending = parseInt(val);
    save();
    alert("Sent to Parent Portal!");
    document.getElementById('mins-input').value = "";
}

function unlockParent() {
    if(document.getElementById('pin').value === "1234") {
        document.getElementById('parent-lock').classList.add('hidden');
        document.getElementById('parent-controls').classList.remove('hidden');
        document.getElementById('goal-input').value = data.goal;
        document.getElementById('pending-msg').innerText = "Pending: " + data.pending + "m";
    }
}

function setGoal() {
    data.goal = parseInt(document.getElementById('goal-input').value);
    save();
    location.reload();
}

function approve() {
    if(data.pending <= 0) return;
    const today = new Date().toISOString().split('T')[0];
    const isMet = data.pending >= data.goal;
    data.logs.unshift({date: new Date().toLocaleDateString('en-US',{month:'short', day:'numeric'}), mins: data.pending});
    data.cal[today] = isMet ? "met" : "missed";
    data.streak = isMet ? (data.streak + 1) : 0;
    data.pending = 0;
    data.taskDone = false; // Reset task for next session
    save();
    location.reload();
}

function render() {
    document.getElementById('streak-display').innerText = data.streak + "d";
    let total = 0;
    data.logs.forEach(l => total += l.mins);
    document.getElementById('avg-display').innerText = data.logs.length ? Math.round(total/data.logs.length) + "m" : "0m";

    const cal = document.getElementById('calendar-days');
    for(let i=1; i<=31; i++) {
        let d = document.createElement('div');
        d.className = 'cal-day';
        d.innerText = i;
        let key = `2026-03-${i.toString().padStart(2,'0')}`;
        if(data.cal[key] === "met") d.classList.add('goal-met');
        if(data.cal[key] === "missed") d.classList.add('goal-missed');
        cal.appendChild(d);
    }

    const mission = missionPool[Math.floor(Math.random() * missionPool.length)];
    document.getElementById('task-display').innerText = mission.task;
    document.getElementById('fact-display').innerText = mission.fact;
    if(data.taskDone) document.getElementById('task-check').classList.add('checked');
}

function askAI() { document.getElementById('ai-response').innerText = "AI Brain is thinking..."; }
function save() { localStorage.setItem("levelUpData", JSON.stringify(data)); }

render();
</script>
</body>
</html>
