<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level Up Your Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00ff9d; --bg: #0a0a0a; --card-bg: #161616; --gold: #ffc107; --blue: #00d4ff; --sidebar-w: 260px; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .sidebar { position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; width: var(--sidebar-w); height: 100%; background: #111; border-right: 1px solid #333; transition: 0.3s; z-index: 1000; padding-top: 80px; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; font-family: 'Orbitron'; font-size: 0.85rem; color: #888; }
        .nav-active { color: var(--neon); background: #1a1a1a; border-left: 4px solid var(--neon); }
        header { padding: 15px 20px; display: flex; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #222; }
        .menu-btn { font-size: 1.4rem; color: var(--neon); cursor: pointer; margin-right: 20px; }
        h1 { font-family: 'Orbitron'; color: var(--neon); margin: 0; font-size: 1.1rem; letter-spacing: 2px; }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 1px solid #222; }
        .primary-btn { width: 100%; padding: 16px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase; margin-top: 10px; }
        .primary-btn:disabled { opacity: 0.3; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        .hidden { display: none; }
        .stat-val { font-family: 'Orbitron'; color: var(--neon); font-size: 1.8rem; display: block; }
        .trust-bg { height: 12px; background: #000; border-radius: 6px; border: 1px solid #333; overflow: hidden; margin-top: 5px; }
        #trust-fill { height: 100%; background: var(--blue); width: 0%; transition: 1.5s; }
        #proof-preview { width: 100%; border-radius: 12px; display: none; margin-top: 10px; border: 2px solid var(--neon); }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="nav-item nav-active" id="nav-dash" onclick="showTab('dash')"><i class="fa-solid fa-gamepad"></i> Dashboard</div>
    <div class="nav-item" id="nav-ai" onclick="showTab('ai')"><i class="fa-solid fa-brain"></i> AI Socratic Tutor</div>
    <div class="nav-item" id="nav-rewards" onclick="showTab('rewards')"><i class="fa-solid fa-trophy"></i> Reward Shop</div>
    <div class="nav-item" id="nav-parent" onclick="showTab('parent')" style="color:var(--gold)"><i class="fa-solid fa-user-shield"></i> Parent Portal</div>
    <div class="nav-item" onclick="location.reload()" style="margin-top:40px; color:#ff4d4d;"><i class="fa-solid fa-power-off"></i> Logout</div>
</div>

<header><i class="fa-solid fa-bars-staggered menu-btn" onclick="toggleSidebar()"></i><h1>LEVEL UP YOUR DAY</h1></header>

<div class="container">
    <section id="tab-dash">
        <div class="card" style="text-align: center;">
            <div style="display:grid; grid-template-columns: 1fr 1fr;">
                <div><span style="font-size:0.6rem; color:#888;">LEVEL</span><span id="display-level" class="stat-val">1</span></div>
                <div><span style="font-size:0.6rem; color:#888;">TOTAL XP</span><span id="display-xp" class="stat-val">0</span></div>
            </div>
            <div class="trust-bg"><div id="trust-fill"></div></div>
        </div>
        <div class="card">
            <h3 style="margin-top:0;"><i class="fa-solid fa-upload"></i> Log Work</h3>
            <input type="number" id="xp-input-mins" placeholder="Minutes worked">
            <label for="camera-input" class="primary-btn" style="background:#222; color:var(--neon); border:1px dashed var(--neon); display:flex; align-items:center; justify-content:center; gap:10px;"><i class="fa-solid fa-camera"></i> Snap Proof</label>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
            <img id="proof-preview">
            <button class="primary-btn" id="vouch-btn" onclick="vouchForXP()" disabled>Vouch for XP</button>
        </div>
    </section>

    <section id="tab-ai" class="hidden">
        <div class="card">
            <h3><i class="fa-solid fa-robot"></i> AI Socratic Tutor</h3>
            <input type="text" id="ai-query" placeholder="Ask for a hint...">
            <button class="primary-btn" style="background:var(--blue)" onclick="runAI()">Ask Tutor</button>
            <div id="ai-response" style="margin-top:20px; padding:15px; background:#000; border-radius:10px; color:var(--blue); display:none;"></div>
        </div>
    </section>

    <section id="tab-rewards" class="hidden">
        <div class="card">
            <h3><i class="fa-solid fa-gift"></i> Reward Shop</h3>
            <div id="reward-display-list"></div>
        </div>
    </section>

    <section id="tab-parent" class="hidden">
        <div id="parent-lock-screen" class="card" style="border: 2px solid var(--gold); text-align:center;">
            <h3>Parent Access</h3>
            <input type="password" id="parent-pin-entry" placeholder="Enter PIN">
            <button class="primary-btn" style="background:var(--gold)" onclick="verifyParent()">Unlock</button>
        </div>

        <div id="parent-admin-panel" class="hidden">
            <div class="card" style="border: 1px solid var(--gold);">
                <h4 style="color:var(--gold)">Pending Approval</h4>
                <span id="admin-pending-val" class="stat-val" style="color:var(--gold)">0 XP</span>
                <div id="admin-image-review"></div>
                <button class="primary-btn" style="background:var(--gold)" onclick="finalizeWork()">Approve XP</button>
            </div>
            
            <div class="card">
                <h4 style="color:var(--gold)">Claims to Fulfill</h4>
                <div id="admin-claims-list"></div>
            </div>

            <div class="card">
                <h4 style="color:var(--gold)">Manage Shop</h4>
                <input type="text" id="new-reward-name" placeholder="Reward Name">
                <input type="number" id="new-reward-cost" placeholder="XP Cost">
                <button class="primary-btn" style="background:white; color:black;" onclick="addNewReward()">Add Reward</button>
            </div>
            <button class="primary-btn" style="background:#333; color:white;" onclick="resetParent()">Lock Portal</button>
        </div>
    </section>
</div>

<script>
    let state = { xp: 0, pending: 0, pin: "1234", proofImg: null, rewards: [{name: "1hr Gaming", cost: 100}], claims: [] };
    const saved = localStorage.getItem('levelup_ultra_v1');
    if(saved) state = JSON.parse(saved);

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function showTab(t) {
        ['dash','ai','rewards','parent'].forEach(s => { document.getElementById('tab-'+s).classList.add('hidden'); document.getElementById('nav-'+s).classList.remove('nav-active'); });
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('nav-'+t).classList.add('nav-active');
        if(t === 'rewards') renderRewards();
        toggleSidebar();
    }

    function handlePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('proof-preview').src = e.target.result;
                document.getElementById('proof-preview').style.display = 'block';
                state.proofImg = e.target.result;
                document.getElementById('vouch-btn').disabled = false;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function vouchForXP() {
        const mins = parseInt(document.getElementById('xp-input-mins').value);
        if(!mins) return;
        state.pending += mins;
        alert("Sent to Parent!");
        document.getElementById('xp-input-mins').value = "";
        document.getElementById('proof-preview').style.display = 'none';
        document.getElementById('vouch-btn').disabled = true;
        save(); updateUI();
    }

    function runAI() {
        const box = document.getElementById('ai-response');
        box.innerText = "🤖 I can't give you the answer, but try looking at the first step. What do you think comes next?";
        box.style.display = "block";
    }

    function verifyParent() {
        if(document.getElementById('parent-pin-entry').value === state.pin) {
            document.getElementById('parent-lock-screen').classList.add('hidden');
            document.getElementById('parent-admin-panel').classList.remove('hidden');
            renderParentReview();
        }
    }

    function renderParentReview() {
        document.getElementById('admin-pending-val').innerText = state.pending + " XP";
        document.getElementById('admin-image-review').innerHTML = state.proofImg ? `<img src="${state.proofImg}" style="width:100%; border-radius:10px; margin-top:10px;">` : "";
        const cList = document.getElementById('admin-claims-list');
        cList.innerHTML = state.claims.length ? "" : "<p style='color:#444'>No rewards waiting.</p>";
        state.claims.forEach((c, i) => {
            const d = document.createElement('div'); d.className = "item-row";
            d.innerHTML = `<span>${c}</span><button onclick="clearClaim(${i})" style="background:var(--neon); border:none; border-radius:5px; padding:5px;">Done</button>`;
            cList.appendChild(d);
        });
    }

    function finalizeWork() { state.xp += state.pending; state.pending = 0; state.proofImg = null; save(); updateUI(); renderParentReview(); }
    function clearClaim(i) { state.claims.splice(i, 1); save(); renderParentReview(); }
    function addNewReward() {
        const n = document.getElementById('new-reward-name').value;
        const c = parseInt(document.getElementById('new-reward-cost').value);
        if(n && c) { state.rewards.push({name:n, cost:c}); save(); }
    }

    function renderRewards() {
        const list = document.getElementById('reward-display-list');
        list.innerHTML = "";
        state.rewards.forEach(r => {
            const d = document.createElement('div'); d.className = "item-row";
            d.innerHTML = `<div><b>${r.name}</b><br><small>${r.cost} XP</small></div><button class="primary-btn" style="width:auto; margin:0; padding:8px 15px;" onclick="buyReward('${r.name}', ${r.cost})" ${state.xp < r.cost ? 'disabled' : ''}>Buy</button>`;
            list.appendChild(d);
        });
    }

    function buyReward(n, c) {
        if(state.xp >= c) { state.xp -= c; state.claims.push(n); alert("Purchased! Show Parent Portal."); save(); updateUI(); renderRewards(); }
    }

    function resetParent() { document.getElementById('parent-lock-screen').classList.remove('hidden'); document.getElementById('parent-admin-panel').classList.add('hidden'); showTab('dash'); }
    function updateUI() {
        document.getElementById('display-xp').innerText = state.xp;
        const lvl = Math.floor(state.xp / 100) + 1;
        document.getElementById('display-level').innerText = lvl;
        document.getElementById('trust-fill').style.width = Math.min((lvl/5)*100, 100) + "%";
    }
    function save() { localStorage.setItem('levelup_ultra_v1', JSON.stringify(state)); }
    updateUI();
</script>
</body>
</html>
