<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up: Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --accent: #00d4ff;
            --bg: #0a0a0a;
            --card: #161616;
            --border: #2a2a2a;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }

        #sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #111; border-right: 1px solid var(--border); transition: 0.3s ease; z-index: 2000; padding: 25px; }
        #sidebar.open { left: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; }
        .sidebar-overlay.active { display: block; }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; height: 100vh; display: none; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-bar { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; background: var(--card); border: 1px solid var(--border); color: #666; padding: 10px 4px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.55rem; }
        .nav-btn.active { border-color: var(--primary); color: var(--primary); background: #1a1a1a; }

        .page { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }

        .btn-main { background: var(--primary); border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Orbitron'; color: #000; margin-top: 10px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #222; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 12px; outline: none; }

        #parent-modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; transition: 0.4s ease; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        #parent-modal.open { top: 0; }
        .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--primary); margin: 0 10px; }
        .pin-dot.filled { background: var(--primary); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .key { width: 70px; height: 70px; border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; cursor: pointer; }

        .admin-task-list { max-height: 200px; overflow-y: auto; border: 1px solid #333; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .task-option { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid #222; font-size: 0.75rem; color: #aaa; }
        .task-option:hover { border-color: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width:340px; text-align:center; border: 1px solid var(--primary);">
            <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:1.4rem;">LEVEL UP</h1>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleAuth()" class="btn-main">INITIALIZE</button>
        </div>
    </div>

    <div id="parent-modal">
        <button onclick="closeParent()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        <h2 style="font-family:'Orbitron'; color:var(--primary);">ADMIN PORTAL</h2>
        <div style="display:flex; margin: 20px 0;" id="pin-display">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
            <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
            <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
            <div class="key" style="border:none;"></div><div class="key" onclick="pressKey(0)">0</div><div class="key" onclick="pressBackspace()">⌫</div>
        </div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--primary); font-size: 1rem;">COMMAND</h2>
        <button class="btn-main" style="background:var(--accent); font-size:0.6rem;" onclick="openParent('settings')">🛡️ PARENT SETTINGS</button>
        <button onclick="logout()" style="position:absolute; bottom:30px; width: 210px; background:#222; border:1px solid var(--danger); color:var(--danger); padding: 10px; border-radius: 10px;">LOGOUT</button>
    </div>

    <div class="container" id="main-app">
        <div class="header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem;">☰</button>
            <h1 style="font-family:'Orbitron'; font-size: 0.7rem; color:var(--primary);">BANK: <span id="total-xp-display">0</span> XP</h1>
            <h1 style="font-family:'Orbitron'; font-size: 0.7rem; color:var(--accent);">LVL <span id="header-lvl">1</span></h1>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" id="btn-dash" onclick="showPage('dash')">DASH</button>
            <button class="nav-btn" id="btn-mission" onclick="showPage('mission')">BOUNTY</button>
            <button class="nav-btn" id="btn-shop" onclick="showPage('shop')">SHOP</button>
            <button class="nav-btn" id="btn-vision" onclick="showPage('vision')">VISION</button>
        </div>

        <div id="page-dash" class="page active">
            <div class="card" style="text-align:center;">
                <h2 id="lvl-display" style="font-family:'Orbitron'; color:var(--primary); font-size:3.5rem; margin:0;">1</h2>
                <div style="background:#222; height:8px; border-radius:10px; margin: 15px 0; overflow:hidden;"><div id="xp-fill" style="background:var(--primary); height:100%; width:0%; transition:0.5s;"></div></div>
                <p style="font-size:0.6rem; color:#666;">RANK PROGRESS</p>
            </div>
            <div class="card">
                <h3 id="today-usage-display" style="margin:0; font-family:'Orbitron'; font-size: 0.9rem;">0m Used</h3>
                <p id="remaining-display" style="font-size:0.8rem; font-family: 'Orbitron';">80m Left</p>
                <input type="number" id="play-input" placeholder="Minutes used" style="margin-top:20px;">
                <button class="btn-main" onclick="logTime()">LOG SESSION</button>
            </div>
        </div>

        <div id="page-mission" class="page">
            <div class="card" style="border-left:4px solid var(--primary); margin-bottom: 30px;">
                <span style="color:var(--accent); font-size:0.6rem; font-weight:bold; font-family:'Orbitron';">ACTIVE MISSION</span>
                <div style="background:#000; padding:30px; border-radius:15px; border:1px dashed #444; margin:15px 0; text-align: center;">
                    <span id="challenge-text" style="font-weight:600; font-size: 1.1rem; color: #fff;">Assigning...</span>
                </div>
                <p style="text-align: center; color: var(--primary); font-family: 'Orbitron'; font-size: 0.8rem;">REWARD: <span id="current-bounty-xp">0</span> XP</p>
                <button class="btn-main" onclick="openParent('bounty')">VERIFY & CLAIM</button>
            </div>
            <p style="text-align:center; font-size:0.7rem; color:#444;">System selects missions from the combined pool.</p>
        </div>

        <div id="page-parent" class="page">
            <div class="card">
                <h3 style="font-family:'Orbitron'; color:var(--accent); margin-top:0;">TASK POOL MANAGEMENT</h3>
                
                <h4 style="font-size:0.6rem; color:#888;">ADD TO ROTATION:</h4>
                <input type="text" id="custom-task-input" placeholder="Task Name">
                <input type="number" id="custom-task-xp" placeholder="XP Value">
                <button class="btn-main" onclick="addCustomTask()">ADD TO POOL</button>
                
                <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
                
                <button class="btn-main" style="background:#222; color:white;" onclick="showPage('dash')">CLOSE SETTINGS</button>
            </div>
        </div>
    </div>

    <script>
        const initialMissions = [
            { name: "Do 15 push-ups", xp: 20 }, { name: "Walk outside (10m)", xp: 25 },
            { name: "Drink 2 glasses of water", xp: 15 }, { name: "Clean gaming area", xp: 30 },
            { name: "20 jumping jacks", xp: 15 }, { name: "Help with a chore", xp: 40 },
            { name: "Stretch neck/back (5m)", xp: 15 }, { name: "Read 5 pages", xp: 25 },
            { name: "Eat a healthy snack", xp: 15 }, { name: "Organize shoes/closet", xp: 30 },
            { name: "3 things I'm grateful for", xp: 10 }, { name: "Do 15 squats", xp: 20 },
            { name: "Finish a water bottle", xp: 15 }, { name: "Put away clean laundry", xp: 35 },
            { name: "Tidy room (10m)", xp: 30 }, { name: "Practice hobby (15m)", xp: 40 },
            { name: "1-minute plank", xp: 25 }, { name: "Wipe down gear", xp: 15 },
            { name: "5m screen-free break", xp: 20 }, { name: "Check on family member", xp: 20 }
        ];

        let taskPool = JSON.parse(localStorage.getItem('taskPool')) || initialMissions;
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let totalXp = parseInt(localStorage.getItem('totalXp')) || 0;
        let lvl = parseInt(localStorage.getItem('lvl')) || 1;
        let bountyXp = parseInt(localStorage.getItem('bountyXp')) || 0;
        let currentTask = localStorage.getItem('currentTask') || "";
        let todayMins = parseInt(localStorage.getItem('todayMins_' + new Date().toLocaleDateString())) || 0;
        let currentPinAttempt = "";
        let pinPurpose = "";

        window.onload = () => {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                if (!currentTask || currentTask === "Assigning...") autoGenerateTask();
                updateUI(); 
            }
        };

        function handleAuth() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!localStorage.getItem('u_email')) {
                localStorage.setItem('u_email', email); localStorage.setItem('u_pass', pass);
            } else if(email === localStorage.getItem('u_email') && pass === localStorage.getItem('u_pass')) {
                localStorage.setItem('isLoggedIn', 'true'); location.reload();
            }
        }

        function logout() { localStorage.setItem('isLoggedIn', 'false'); location.reload(); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('active'); }

        // --- CORE LOGIC: RANDOM DRAW FROM COMBINED POOL ---
        function autoGenerateTask() {
            const randomTask = taskPool[Math.floor(Math.random() * taskPool.length)];
            currentTask = randomTask.name;
            bountyXp = randomTask.xp;
            localStorage.setItem('currentTask', currentTask);
            localStorage.setItem('bountyXp', bountyXp);
        }

        function openParent(purpose) {
            pinPurpose = purpose; currentPinAttempt = "";
            document.getElementById('parent-modal').classList.add('open');
        }

        function closeParent() { document.getElementById('parent-modal').classList.remove('open'); }

        function pressKey(num) {
            if(currentPinAttempt.length < 4) {
                currentPinAttempt += num;
                updatePinDots();
                if(currentPinAttempt === "1234") {
                    setTimeout(() => {
                        closeParent();
                        if(pinPurpose === 'bounty') claimBounty();
                        else showPage('parent');
                    }, 200);
                } else if(currentPinAttempt.length === 4) { currentPinAttempt = ""; updatePinDots(); }
            }
        }

        function pressBackspace() { currentPinAttempt = currentPinAttempt.slice(0, -1); updatePinDots(); }
        function updatePinDots() { const dots = document.querySelectorAll('.pin-dot'); dots.forEach((dot, i) => dot.className = i < currentPinAttempt.length ? 'pin-dot filled' : 'pin-dot'); }

        // ADD NEW TASK TO THE ROTATION
        function addCustomTask() {
            const name = document.getElementById('custom-task-input').value;
            const val = parseInt(document.getElementById('custom-task-xp').value);
            if(name && val) {
                taskPool.push({ name, xp: val });
                localStorage.setItem('taskPool', JSON.stringify(taskPool));
                document.getElementById('custom-task-input').value = "";
                document.getElementById('custom-task-xp').value = "";
                alert("Task added to rotation pool.");
            }
        }

        function claimBounty() {
            if(bountyXp === 0) return;
            xp += bountyXp; totalXp += bountyXp;
            if(xp >= 100) { xp -= 100; lvl++; }
            autoGenerateTask();
            save(); updateUI(); alert("XP Awarded. Next Mission Loading...");
        }

        function logTime() {
            let v = parseInt(document.getElementById('play-input').value);
            if(v > 0) { todayMins += v; document.getElementById('play-input').value = ""; save(); updateUI(); }
        }

        function save() {
            localStorage.setItem('xp', xp); localStorage.setItem('totalXp', totalXp);
            localStorage.setItem('lvl', lvl); localStorage.setItem('todayMins_' + new Date().toLocaleDateString(), todayMins);
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = lvl;
            document.getElementById('header-lvl').innerText = lvl;
            document.getElementById('total-xp-display').innerText = totalXp;
            document.getElementById('xp-fill').style.width = Math.min(xp, 100) + "%";
            document.getElementById('today-usage-display').innerText = todayMins + "m Used";
            document.getElementById('challenge-text').innerText = currentTask;
            document.getElementById('current-bounty-xp').innerText = bountyXp;
            let rem = 80 - todayMins;
            document.getElementById('remaining-display').innerText = rem >= 0 ? rem + "m Left" : "OVER LIMIT";
            document.getElementById('remaining-display').style.color = rem >= 0 ? "var(--primary)" : "var(--danger)";
        }
    </script>
</body>
</html>
